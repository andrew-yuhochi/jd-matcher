{# Shared partial: expanded JD body section.
   Included by _card.html, applied.html, and dismissed.html.
   Variable: posting.full_jd (str | None) #}
<div class="card-expanded-body">
  {% if posting.full_jd %}
    <p class="card-full-jd">{{ posting.full_jd }}</p>
  {% else %}
    <p class="card-full-jd-empty">Full job description not available. Open at source for details.</p>
  {% endif %}
</div>
